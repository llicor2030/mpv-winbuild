          66c46b8c9436613fd81bc5d03f63a61933a4dcc3  https://gitlab.com/bzip2/bzip2.git
          e224b86b2f0160b0590d1c6afef77230b812867b  https://gitlab.com/libssh/libssh-mirror.git
          9a5b35c430a2e6d150d65a96c7d7acdd64962a8f  https://gitlab.com/shinchiro/lame.git
          66c7ef01faabe7ad6293d6b738d4103de77437b4  https://gitlab.com/shinchiro/nettle.git
          945b592b70470e29f917f4de89b4281fbbd540c0  https://gitlab.com/shinchiro/soxr.git
          06029ec3340cdf6bf9a6a537dafb3f39eda0560e  https://gitlab.freedesktop.org/uchardet/uchardet.git
          3f62de0eddedb9a246d32b150d6bc47baa790282  https://aomedia.googlesource.com/aom.git
          c8cc2c1365b6a1f1dcb35733a99b7d2fc3333a71  https://github.com/ngtcp2/ngtcp2.git
          056fbdf9102c4fbc40844dd1ae83d467af31dbeb  https://github.com/ngtcp2/nghttp3.git
          LOCK_EOF

          # Local mpv patch refresh path.
          # When build/source caches are restored, mpv ExternalProject may already
          # have completed its patch/build stamps.  Remove only mpv's build prefix
          # and reset the mpv source tree so replacing packages/mpv-*.patch actually
          # rebuilds libmpv without rebuilding LLVM or all dependencies.
          if compgen -G "packages/mpv-*.patch" > /dev/null; then
            echo "=== local mpv patch detected: force mpv-only ExternalProject rebuild ==="
            rm -rf build${{ matrix.bit }}/packages/mpv-prefix
            if [ -d "src_packages/mpv/.git" ]; then
              if git -C src_packages/mpv cat-file -e 9bb5fe9680718d6b9f654ee8e978caf0280b9a27^{commit}; then
                git -C src_packages/mpv reset --hard 9bb5fe9680718d6b9f654ee8e978caf0280b9a27
                git -C src_packages/mpv clean -fdx
              else
                echo "mpv source cache does not contain pinned commit; deleting src_packages/mpv for fresh clone"
                rm -rf src_packages/mpv
              fi
            fi
          fi

          if [[ "$(ls -A ../wrapper/patch/*.patch)" ]]; then
            for patch in ../wrapper/patch/*.patch ; do
              git am --3way "$patch" || git am --abort
            done
          fi
          if [ "${{ matrix.lgpl }}" = "true" ]; then
            git am --3way ../wrapper/compile-lgpl-libmpv.patch
          fi
          # Enable packages/mpv-*.patch support before editing packages/mpv.cmake.
          # 0000-mpv-add-patch.patch touches packages/mpv.cmake, so applying it
          # after sed edits causes: "Your local changes ... would be overwritten".
          if compgen -G "packages/mpv-*.patch" > /dev/null; then
            echo "mpv patch files exist:"
            ls -l packages/mpv-*.patch
            if grep -q 'PATCH_COMMAND.*mpv-\*.patch' packages/mpv.cmake; then
              echo "mpv package patch support is already active"
            else
              echo "enabling mpv package patch support via wrapper/patch_pr/0000-mpv-add-patch.patch"
              git am --3way ../wrapper/patch_pr/0000-mpv-add-patch.patch || {
                git am --abort || true
                echo "::error::failed to apply wrapper/patch_pr/0000-mpv-add-patch.patch"
                exit 1
              }
            fi
          else
            echo "no packages/mpv-*.patch files, skipping mpv package patch support"
          fi

          # Use the-database/mpv as the mpv source and pin it to the
          # 2026-06-18 working AnimeJaNai snapshot. This workflow itself may live
          # on a newer fork, but the build wrapper and package patches above are
          # taken from the b7423e62 2026-06-18 successful-run snapshot.
          sed -i 's|https://github.com/mpv-player/mpv.git|https://github.com/the-database/mpv.git|g; s|mpv-player/mpv\.git|the-database/mpv.git|g' packages/mpv.cmake
          if ! grep -q '9bb5fe9680718d6b9f654ee8e978caf0280b9a27' packages/mpv.cmake; then
            sed -i '/GIT_REPOSITORY .*the-database\/mpv\.git/a\    GIT_TAG 9bb5fe9680718d6b9f654ee8e978caf0280b9a27' packages/mpv.cmake
          fi

          # Build a 2026-06-18 source lock.  This is the stable "B" approach
          # for full rebuilds: pin every package CMake file that lacks GIT_TAG to
          # the commit that was reachable at the successful 2026-06-18 run time.
          # Known heavy/verified commits are hardcoded to avoid expensive history scans.
          python3 - <<'PY'
          from pathlib import Path
          import re
          import subprocess
          import tempfile
          import shutil

          CUTOFF = "2026-06-18T00:40:00Z"

          # Commits verified from the 6/18 success log / previous comparison notes.
          # Short SHAs are okay for Git, but full SHAs are preferred when known.
          KNOWN_BY_REPO_PART = {
              "the-database/mpv": "9bb5fe9680718d6b9f654ee8e978caf0280b9a27",
              "FFmpeg/FFmpeg": "f760b2fb6",
              "haasn/libplacebo": "3be579e",
              "libass/libass": "35ba2ca",
              "llvm/llvm-project": "1f5aee5",
              "mingw-w64": "0034988",
              "zlib-ng/zlib-ng": "5d005c5",
          }

          STATIC_LOCK = {}
          _lf = Path("../source-lock-pinned.txt")
          if _lf.exists():
              for _ln in _lf.read_text().splitlines():
                  _ln = _ln.strip()
                  if not _ln:
                      continue
                  _sha, _url = _ln.split(None, 1)
                  STATIC_LOCK[_url.strip().rstrip("/").removesuffix(".git")] = _sha.strip()

          cache = {}

          def run(args, cwd=None, check=True):
              print("+", " ".join(args))
              return subprocess.run(args, cwd=cwd, check=check, text=True,
                                    stdout=subprocess.PIPE, stderr=subprocess.STDOUT).stdout

          def known_commit(url):
              u = url.strip().rstrip("/").removesuffix(".git")
              if u in STATIC_LOCK:
                  return STATIC_LOCK[u]
              for key, val in KNOWN_BY_REPO_PART.items():
                  if key.lower() in url.lower():
                      return val
              return None

          def default_branch(url):
              out = run(["git", "ls-remote", "--symref", url, "HEAD"], check=False)
              m = re.search(r"ref: refs/heads/([^\t ]+)\s+HEAD", out)
              if m:
                  return m.group(1)
              for b in ("master", "main"):
                  out2 = run(["git", "ls-remote", "--heads", url, b], check=False)
                  if out2.strip():
                      return b
              raise SystemExit(f"could not determine default branch for {url}")

          def commit_at_date(url):
              if url in cache:
                  return cache[url]
              k = known_commit(url)
              if k:
                  cache[url] = k
                  return k
              branch = default_branch(url)
              tmp = Path(tempfile.mkdtemp(prefix="pinrepo_"))
              try:
                  # Full commit history, filtered blobs. Needed for --before.
                  run(["git", "clone", "--bare", "--filter=blob:none", "--branch", branch, url, str(tmp / "repo.git")])
                  sha = run(["git", "rev-list", "-n", "1", f"--before={CUTOFF}", f"refs/heads/{branch}"], cwd=tmp / "repo.git").strip()
                  if not sha:
                      raise SystemExit(f"no commit before {CUTOFF} for {url} {branch}")
                  cache[url] = sha
                  return sha
              finally:
                  shutil.rmtree(tmp, ignore_errors=True)

          def patch_file(path: Path):
              text = path.read_text()
              lines = text.splitlines()
              # Packages that ship a bundled git-am patch (packages/<name>-*.patch).
              # These need a FULL clone: when pinned (or even at tip) the patch may
              # not apply by plain context, so "git am --3way" falls back to a
              # 3-way merge, which needs the patch's pre-image blobs. With the
              # winbuild's default "--sparse --filter=tree:0" (blobless) clone those
              # blobs are absent and the step dies with
              #   "sha1 information is lacking or useless ... could not build fake ancestor".
              # So for these packages we keep the pin but de-sparsify the clone so
              # --3way can actually merge. (Core AV deps ship no bundled patch, so
              # their reproducibility/clone size is unaffected.)
              # GIT_RESET packages (e.g. openssl) already check out the patch's
              # exact base, so plain "git am" applies and no blob-hungry 3-way is
              # needed; leave their blobless clone alone to avoid a huge full clone.
              has_bundled_patch = (any(path.parent.glob(f"{path.stem}-*.patch"))
                                   and not re.search(r"\bGIT_RESET\b", text))
              out = []
              changed = False
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if has_bundled_patch and "GIT_CLONE_FLAGS" in line:
                      # keep blobs for git am --3way: strip --sparse/--filter from
                      # inside the quoted flags only (don't eat the closing quote)
                      fm = re.search(r'GIT_CLONE_FLAGS\s+"([^"]*)"', line)
                      if fm:
                          inner = re.sub(r"--sparse\b\s*", "", fm.group(1))
                          inner = re.sub(r"--filter=\S+\s*", "", inner)
                          newline = line[:fm.start()] + f'GIT_CLONE_FLAGS "{inner.strip()}"' + line[fm.end():]
                          if newline != line:
                              print(f"DEFILTER {path}: {line.strip()} -> {newline.strip()}")
                              line = newline
                              changed = True
                  if has_bundled_patch and "GIT_CLONE_POST_COMMAND" in line and "sparse-checkout" in line:
                      # full checkout: the sparse post-command is meaningless now
                      print(f"DESPARSE {path}: drop {line.strip()}")
                      changed = True
                      i += 1
                      continue
                  out.append(line)
                  m = re.search(r"GIT_REPOSITORY\s+([^\s)]+)", line)
                  if not m:
                      i += 1
                      continue
                  url = m.group(1).strip().strip('"')
                  # Look ahead within the current ExternalProject block.
                  j = i + 1
                  has_tag = False
                  while j < len(lines):
                      nxt = lines[j]
                      if "GIT_REPOSITORY" in nxt or nxt.strip() == ")":
                          break
                      # Treat GIT_RESET (fork's working-commit pin, e.g. openssl,
                      # curl) the same as GIT_TAG: such packages are already
                      # pinned, and injecting a GIT_TAG would override the reset,
                      # check out the wrong commit, and break their bundled
                      # git-am patch (which then fails via --3way on the blobless
                      # --filter=tree:0 clone: "could not build fake ancestor").
                      if re.search(r"\bGIT_TAG\b", nxt) or re.search(r"\bGIT_RESET\b", nxt):
                          has_tag = True
                          break
                      j += 1
                  if not has_tag:
                      if not (url.startswith("http://") or url.startswith("https://") or url.startswith("git://")):
                          raise SystemExit(f"unsupported GIT_REPOSITORY URL in {path}: {url}")
                      sha = commit_at_date(url)
                      indent = re.match(r"^(\s*)", line).group(1)
                      out.append(f"{indent}GIT_TAG {sha}")
                      print(f"PIN {path}: {url} -> {sha}")
                      changed = True
                  i += 1
              if changed:
                  path.write_text("\n".join(out) + "\n")
              return changed

          changed_files = []
          for path in sorted(Path("packages").glob("*.cmake")):
              if "GIT_REPOSITORY" not in path.read_text(errors="ignore"):
                  continue
              if patch_file(path):
                  changed_files.append(str(path))

          print("=== source lock summary ===")
          for url, sha in sorted(cache.items()):
              print(f"{sha}  {url}")
          Path("../source-lock-2026-06-18.txt").write_text("\n".join(f"{sha}  {url}" for url, sha in sorted(cache.items())) + "\n")

          if changed_files:
              run(["git", "add", *changed_files])
              run(["git", "-c", "user.name=ci", "-c", "user.email=ci@local", "commit", "-m", "lock source packages to 2026-06-18"])
          else:
              print("all package sources already have GIT_TAGs")
          PY

          # Ensure mpv itself is redirected to the AnimeJaNai fork and pinned.
          sed -i 's|https://github.com/mpv-player/mpv.git|https://github.com/the-database/mpv.git|g; s|mpv-player/mpv\.git|the-database/mpv.git|g' packages/mpv.cmake
          python3 - <<'PY'
          from pathlib import Path
          p = Path('packages/mpv.cmake')
          text = p.read_text()
          wanted = 'GIT_TAG 9bb5fe9680718d6b9f654ee8e978caf0280b9a27'
          if wanted not in text:
              lines = text.splitlines()
              out=[]
              for line in lines:
                  out.append(line)
                  if 'GIT_REPOSITORY' in line and 'the-database/mpv.git' in line:
                      out.append('    ' + wanted)
              p.write_text('\n'.join(out)+'\n')
          PY
          if ! git diff --quiet -- packages/mpv.cmake; then
            git add packages/mpv.cmake
            git -c user.name=ci -c user.email=ci@local commit -m "redirect and pin mpv source"
          fi

          echo "=== effective mpv.cmake: mpv source ==="
          grep -n -A12 -B4 'GIT_REPOSITORY .*mpv' packages/mpv.cmake || true
          echo "=== effective dependency GIT_TAGs ==="
          for f in packages/ffmpeg.cmake packages/libplacebo.cmake packages/libass.cmake packages/dav1d.cmake; do
            echo "--- $f ---"
            grep -n -A3 -B2 'GIT_REPOSITORY' "$f" || true
            grep -n 'GIT_TAG' "$f" || true
          done
          echo "=== effective mpv.cmake: PATCH_COMMAND ==="
          grep -n 'PATCH_COMMAND' packages/mpv.cmake || true
          grep -n 'mpv-\*.patch' packages/mpv.cmake || true
          echo "=== selected source heads before build ==="
          for p in mpv ffmpeg libplacebo libass dav1d; do
            if [ -d "src_packages/${p}/.git" ]; then
              printf '%-12s ' "$p"
              git -C "src_packages/${p}" rev-parse --short HEAD || true
            else
              echo "$p not cloned yet"
            fi
          done
          echo "=== local mpv patches ==="
          ls -l packages/mpv-*.patch || true
          echo "=== mpv patch sha256 / subject ==="
          sha256sum packages/mpv-*.patch || true
          grep -h '^Subject:' packages/mpv-*.patch || true

          echo "=== cache policy ==="
          echo "Build without cache / needclean = ${{ inputs.needclean }}"
          echo "Full 6/18 dependency rebuild = ${{ inputs.repro_618_deps }}"
          echo "Rebuild clang_root/LLVM = ${{ inputs.rebuild_llvm }}"
          echo "For exact dependency repro: repro_618_deps=true, rebuild_llvm=false unless LLVM cache is known bad."

          # Patched packages were de-sparsified above so a FRESH clone keeps the
          # blobs that "git am --3way" needs. But a cache-restored src_packages/<pkg>
          # is still the OLD blobless (--filter=tree:0) clone, and ExternalProject
          # will not re-clone an existing dir, so the bundled patch still dies with
          # "could not build fake ancestor". For each patched package (no GIT_RESET)
          # whose cached source is still a partial clone, drop the cached source and
          # its build prefix to force a fresh full clone + re-patch. Once a full
          # clone is cached this is skipped, so it does not re-clone every run.
          # (mpv has its own dedicated rebuild block above and is excluded here.)
          echo "=== force fresh full clone for blobless patched packages ==="
          for cm in packages/*.cmake; do
            pkg=$(basename "$cm" .cmake)
            [ "$pkg" = mpv ] && continue
            if compgen -G "packages/${pkg}-*.patch" > /dev/null && ! grep -q 'GIT_RESET' "$cm"; then
              if [ -d "src_packages/${pkg}/.git" ] && \
                 git -C "src_packages/${pkg}" config --get remote.origin.partialclonefilter >/dev/null 2>&1; then
                echo "PATCHED-PKG CLEAN (cached clone is blobless): ${pkg}"
                rm -rf "src_packages/${pkg}" "build${{ matrix.bit }}/packages/${pkg}-prefix"
              fi
            fi
          done

          # === align cache-restored sources to the 2026-06-18 lock ===
          # Cached src_packages/<pkg> keep whatever commit the cache had and drift
          # forward; reset each to its locked commit so cache builds match 6/18.
          if [ -f ../source-lock-pinned.txt ]; then
            declare -A LOCK
            while read -r sha url; do
              [ -z "$sha" ] && continue
              url="${url%.git}"; url="${url%/}"
              LOCK["$url"]="$sha"
            done < ../source-lock-pinned.txt
            for cm in packages/*.cmake; do
              pkg=$(basename "$cm" .cmake)
              [ "$pkg" = mpv ] && continue
              d="src_packages/$pkg"
              [ -d "$d/.git" ] || continue
              url=$(grep -oE 'GIT_REPOSITORY[[:space:]]+[^[:space:])"]+' "$cm" | head -1 | awk '{print $2}')
              url="${url%.git}"; url="${url%/}"
              sha="${LOCK[$url]}"
              [ -z "$sha" ] && continue
              full=$(git -C "$d" rev-parse "${sha}^{commit}" 2>/dev/null)
              if [ -z "$full" ]; then
                git -C "$d" fetch --depth=1 origin "$sha" 2>/dev/null || git -C "$d" fetch origin 2>/dev/null || true
                full=$(git -C "$d" rev-parse "${sha}^{commit}" 2>/dev/null)
              fi
              cur=$(git -C "$d" rev-parse HEAD 2>/dev/null)
              if [ -n "$full" ] && [ "$cur" != "$full" ]; then
                echo "LOCK-FIX $pkg: ${cur:0:10} -> ${full:0:10}"
                git -C "$d" reset --hard "$full" && git -C "$d" clean -fdx || rm -rf "$d"
                rm -rf "build${{ matrix.bit }}/packages/$pkg-prefix"
              fi
            done
          fi

          bash ../wrapper/build.sh -t '${{ matrix.bit }}' -c '${{ inputs.compiler }}' -s "${{ matrix.lgpl == true && 'true' || 'false' }}"
      - name: Upload source lock manifest
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: source-lock-2026-06-18-${{ matrix.bit }}${{ matrix.lgpl == true && '-lgpl' || '' }}
          path: source-lock-2026-06-18.txt
          if-no-files-found: ignore
      - name: Dump configure logs on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "=== configure logs tail ==="
          find mpv-winbuild-cmake/build${{ matrix.bit }}/packages -path '*-stamp/*configure*.log' -type f -print | while read -r f; do
            echo
            echo "===== $f ====="
            tail -n 200 "$f" || true
          done

      - name: Collect logs
        if: ${{ always() }}
        run: |
          sudo 7z a logs.7z $(find mpv-winbuild-cmake/build${{ matrix.bit }} -type f -iname "*-*.log" -or -wholename "*/ffbuild/config.log")
      - name: upload logs
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: ${{ matrix.bit }}${{ matrix.lgpl == true && '-lgpl' || '' }}_logs
          path: logs.7z

      - name: "Get artifacts' name and path"
        id: get_files
        uses: actions/github-script@v9
        with:
          script: |
            const path = require('path');
            const types = ["mpv-debug", "mpv-dev", "mpv"];
            const lgpl = ${{ matrix.lgpl }} ? "-lgpl" : "";
            let arch="";
            switch ( "${{ matrix.bit }}" ) {
              case "32":
                arch = "i686";
                break;
              case "64":
                arch = "x86_64";
                break;
              case "64-v3":
                arch = "x86_64-v3";
                break;
              case "aarch64":
                arch = "aarch64";
                break;
            }
            for (let type of types) {
              const globber = await glob.create(`mpv-winbuild-cmake/release/${type}${lgpl}-${arch}-*.7z`);
              const files = await globber.glob();
              if ( files.length > 0 ) {
                const file = files[0];
                core.exportVariable( `${type}_path`, file );
              }
            }
            
            let { stdout: ffmpeg_hash } = await exec.getExecOutput("git -C mpv-winbuild-cmake/src_packages/ffmpeg rev-parse --short HEAD");
            ffmpeg_hash = ffmpeg_hash.trim();
            const ffmpeg_name = `ffmpeg${lgpl}-${arch}-git-${ffmpeg_hash}`;
            core.exportVariable( 'ffmpeg_name', ffmpeg_name );
            const globber = await glob.create(`./mpv-winbuild-cmake/build${{ matrix.bit }}/**/ffmpeg.exe`);
            const ffmpeg_path = (await globber.glob())[0]
            await exec.exec(`7z a -m0=lzma2 -mx=9 -ms=on mpv-winbuild-cmake/release/${ffmpeg_name}.7z ${ffmpeg_path}`)

      - name: upload mpv-debug
        uses: actions/upload-artifact@v7
        if: ${{ env.mpv-debug_path }}
        with:
          path: ${{ env.mpv-debug_path }}
          archive: false
      - name: upload mpv-dev
        uses: actions/upload-artifact@v7
        if: ${{ env.mpv-dev_path }}
        with:
          path: ${{ env.mpv-dev_path }}
          archive: false
      - name: upload mpv
        uses: actions/upload-artifact@v7
        if: ${{ env.mpv_path }}
        with:
          path: ${{ env.mpv_path }}
          archive: false
          
      - name: upload ffmpeg
        uses: actions/upload-artifact@v7
        if: ${{ env.ffmpeg_name }}
        with:
          path: mpv-winbuild-cmake/release/${{ env.ffmpeg_name }}.7z
          archive: false

      - name: Save clang sysroot cache
        if: ${{ inputs.compiler =='clang' && inputs.no_save_cache != true && matrix.lgpl != true }}
        uses: actions/cache/save@v5.0.5
        with: 
          path: ${{ github.workspace }}/mpv-winbuild-cmake/clang_root
          key: ${{ matrix.bit }}-clang_root-${{ env.cache_suffix }}
      - name: Save Sources Cache
        if: ${{ inputs.no_save_cache != true && matrix.lgpl != true }}
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ github.workspace }}/mpv-winbuild-cmake/src_packages
          key: source-${{ env.cache_suffix }}
      - name: Save Rust Cache
        if: ${{ inputs.no_save_cache != true && matrix.lgpl != true }}
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ github.workspace }}/mpv-winbuild-cmake/install_rustup
          key: rust-${{ env.cache_suffix }}
      - name: Save Build Cache
        if: ${{ inputs.no_save_cache != true && matrix.lgpl != true }}
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ github.workspace }}/mpv-winbuild-cmake/build${{ matrix.bit }}
          key: ${{ env.build_save_key }}

      - name: "Job summary"
        uses: actions/github-script@v9
        continue-on-error: true
        if: ${{ always() }}
        with:
          script: |
            const path = require('path');
            const { readdirSync,existsSync } = require('fs');
            const myExec = async (command, args = null) => await exec.getExecOutput(command,args,{silent: true}).then(result => result.stdout.trim()).catch(err => '');
            
            const upstreamDir = path.resolve("mpv-winbuild-cmake");
            const workdir = path.resolve(upstreamDir,"src_packages");
            const isGitSync = dirname => existsSync(path.join(workdir, dirname, '.git'));
            
            const getGithubUrl = (hash,remote) => remote.replace(/\.git$/,"") + `/commit/${hash}`;
            const getGitlabUrl = (hash,remote) => remote.replace(/\.git$/,"") + `/-/commit/${hash}`;
            const getBitbucketUrl = (hash,remote) => remote.replace(/\.git$/,"") + `/commits/${hash}`;
            const getGoogleSourceUrl = (hash,remote) => remote + `/+/${hash}`;            
            const gethGitVideolanUrl = (hash,remote) => remote.replace(/\/git\//,"/?p=") + `;a=commit;h=${hash}`;
            const getCgitUrl = (hash,remote) => remote + `/commit/?id=${hash}`;
            const getCodebergUrl = (hash,remote) => remote.replace(/\.git$/,"") + `/commit/${hash}`;
            function getCommitUrl(hash,remote) {
                let url = "";
                switch (true) {
                  case /github\.com/.test(remote):
                    url = getGithubUrl(hash,remote);
                    break;
                  case /(gitlab\.com|code\.videolan\.org|gitlab\.(gnome|freedesktop)\.org)/.test(remote):
                    url = getGitlabUrl(hash,remote);
                    break;
                  case /bitbucket\.org/.test(remote):
                    url = getBitbucketUrl(hash,remote);
                    break;
                  case /googlesource\.com/.test(remote):
                    url = getGoogleSourceUrl(hash,remote);
                    break;
                  case /git\.videolan\.org/.test(remote):
                    url = gethGitVideolanUrl(hash,remote);
                    break;
                  case /git\.libssh\.org/.test(remote):
                    url = getCgitUrl(hash,remote);
                    break;
                  case /codeberg\.org/.test(remote):
                    url = getCodebergUrl(hash,remote);
                    break;
                  default:
                    url = remote;
                    break;
                }
                return url;
            }
            async function repo_info(dir){
              let local_hash = await myExec(`git -C ${dir} rev-parse --short=7 HEAD`);
              let remote_branch = await myExec(`git -C ${dir} rev-parse --abbrev-ref HEAD@{upstream}`);
              let remote_hash = await myExec(`git -C ${dir} rev-parse ${remote_branch}`);
              let status = await myExec(`git -C ${dir} status -sb`).then(s => s.split("\n",1)[0].replace(/^## */,""));
              let remote = await myExec(`git -C ${dir} config --get remote.origin.url`);
              return [local_hash, remote_hash, status, remote]
            }
            
            async function generateGitInfoTable(targetDir){
              const dirs = readdirSync(targetDir, { withFileTypes: true })
                .filter(dirent => dirent.isDirectory() && isGitSync(dirent.name) )
                .map(dirent => path.join(targetDir, dirent.name));
              let info_table = [[{data: 'Package', header: true}, {data: 'Local commit', header: true}, {data: 'Status', header: true}, {data: 'Remote commit', header: true}]];
              for (let dir of dirs) {
                [local_hash, remote_hash, status, remote] = await repo_info(dir)
                let url = getCommitUrl(remote_hash, remote);
                let package_name = path.basename(dir);
                info_table.push([package_name, local_hash, status, `<a href="${url}">${remote_hash.slice(0,10)}</a>`]);
              }
              return info_table;
            }

            await core.summary.clear();
            let packages_table = await generateGitInfoTable(workdir);
            packages_table = core.summary.addTable(packages_table).stringify();
            await core.summary.clear();
            
            [upstream_local_hash, upstream_remote_hash, upstream_status, upstream_remote] = await repo_info(upstreamDir)
            const upstream_url = getCommitUrl(upstream_remote_hash, upstream_remote);

            const exec_path = path.join(upstreamDir,'build${{ matrix.bit }}','exec');
            const compiler_version = (await myExec(`${exec_path}`,["cross-gcc","--version","||","clang","--version"])).split('\n')[0];
                        
            core.summary
              .addRaw(`mpv-winbuild-cmake: ${upstream_status} (remote:<a href="${upstream_url}">${upstream_remote_hash.slice(0,10)}</a>)`,true)
              .addRaw(`Compiler: ${compiler_version}`,true);
            const patch_note = `${{ needs.params.outputs.patch_note }}`;
            if (patch_note) {
              core.summary.addHeading('Merged Prs');
              core.summary.addList(patch_note.replace(/- \[(?<pr>#\d+)\]\((?<url>.*)\)/g,"<a href='$<url>'>$<pr></a>").replace(/`(?<code>[^`]+)`/g, '<code>$<code></code>').split('\n'));
            }
            await core.summary.addDetails('Packages Version',packages_table).write();


  publish_release:
    name: Publish release
    needs: [build_mpv,params]
    if: ${{ inputs.release == true }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '{mpv,ffmpeg}*'
          merge-multiple: true
          skip-decompress : true
    
      - name: "Check artifacts"
        uses: actions/github-script@v9
        with:
          script: |
            const globber = await glob.create(`artifacts/mpv*.7z`);
            const files = await globber.glob();
            if ( files.length == 0 ) {
              core.setFailed("Artifact does not exist!");
            }

      - name: Get current time
        run: |
          echo "long_time=$(date "+%Y-%m-%d %H:%M")" >> $GITHUB_ENV
          echo "short_time=$(date "+%Y-%m-%d")" >> $GITHUB_ENV
          echo "tag_name=$(date "+%Y-%m-%d")-$(head -c 10 <<< "${{needs.params.outputs.sha}}")"  >> $GITHUB_ENV

      - name: Commit version & remove existing tag
        env:
          tag_name: ${{ env.tag_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git fetch --tags
          git checkout version || git checkout -b version origin/version || ( git checkout --orphan version && git rm -rf . )
          echo -e "${tag_name}" > version
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version
          git diff-index --quiet HEAD || ( git commit -m "${tag_name}" && git push origin version )
          if [ $(git tag -l "${tag_name}") ] ;then
            gh release delete "${tag_name}" || true
            git push --delete origin "${tag_name}" || true
            git tag -d "${tag_name}" || true
          fi
          git checkout main

      - name: "Generate release note & sha256"
        id: note
        uses: actions/github-script@v9
        with:
          script: |
            const sha = `${{ needs.params.outputs.sha }}`;
            let note = `**MPV Git commit**: https://github.com/the-database/mpv/commit/${sha}\n`;
            note+="**Build Time**: ${{ env.long_time }}\n";
            note+="**Compiler**: ${{ inputs.compiler }}\n";
            note+="**Build Details**: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}\n";
            const patch_note = `${{ needs.params.outputs.patch_note }}` ;
            if (patch_note) {
              note+=`Merged Prs:\n${patch_note}\n`;
            }
            note+="**Download Tips:**\n";
            const path = require('path');
            const tips = {
              "i686": "for 32 bit system",
              "x86_64": "for 64 bit system",
              "x86_64-v3": "for 64 bit system with cpu not older than Intel Haswell or AMD Excavator",
              "aarch64": "for ARM64(aarch64)"
            }
            async function getTips(arch){
              const globber = await glob.create(`artifacts/mpv-${arch}-[0-9]*.7z`);
              const files = await globber.glob();
              if ( files.length > 0 ) {
                const name = path.basename(files[0]);
                return `[${name}](https://github.com/${{github.repository}}/releases/download/${{ env.tag_name }}/${name}): ${tips[arch]}\n`
              } else {
                return ""
              }
            }
            for(const arch of Object.keys(tips)){
              note += await getTips(arch);
            }
            note+="**Downloads**: ![downloads](https://img.shields.io/github/downloads/${{github.repository}}/${{ env.tag_name }}/total?cacheSeconds=300)";
            core.setOutput("note",note);

            const os = require('os'); 
            const { basename } = require('path');
            const { createHash } = require('crypto');
            const { readFileSync,writeFileSync } = require('fs');
            const globber = await glob.create([`artifacts/mpv*.7z`,`artifacts/ffmpeg*.7z`].join('\n'));
            const files = await globber.glob();
            if ( files.length > 0 ) {
              let sha256="";
              for (let file of files) {
                const buff = readFileSync(file);
                const hash = createHash("sha256").update(buff).digest("hex");
                sha256+=`${hash} ${basename(file)}${os.EOL}`;
              }
              writeFileSync('sha256.txt', sha256.trim(), { flag: 'w+' });
            }

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/mpv*.7z,artifacts/ffmpeg*.7z,sha256.txt"
          commit: version
          name: "${{ env.long_time }}"
          body: "${{ steps.note.outputs.note }}"
          tag: "${{ env.tag_name }}"
          allowUpdates: true
          artifactErrorsFailBuild: true
          prerelease: false
          makeLatest: true
      - name: Attest
        uses: actions/attest@v4
        continue-on-error: true
        with:
          subject-path: 'artifacts/*.7z'
      - name: Prune old releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout main
          bash prunetags.sh

  cache:
    name: keep cache alive
    needs: [params,build_mpv]
    if: ${{ inputs.no_save_cache != true }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/archlinux/archlinux:base-devel
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.params.outputs.matrix_bit) }}

    steps:
      - name: Prepare
        run: |
          sudo pacman -Syu --noconfirm
          sudo pacman -S --noconfirm --needed git curl
      - uses: actions/checkout@v6

      - name: Resave Toolchain Cache
        id: toolchain
        uses: ./action/resave_cache
        with:
          path: ${{ github.workspace }}/mpv-winbuild-cmake/build${{ matrix.bit }}
          key: toolchain-${{ inputs.compiler }}-build${{ matrix.bit }}-
          restore-keys: toolchain-${{ inputs.compiler }}-build${{ matrix.bit }}-

      - name: Generate cache key
        id: generate_key
        uses: actions/github-script@v9
        with:
          script: |
            let toolchain_restore_key="${{ steps.toolchain.outputs.cache-matched-key }}";
            
            if (toolchain_restore_key) {
              const toolchain_version = toolchain_restore_key.split("-build${{ matrix.bit }}-").at(-1);
              core.exportVariable( `toolchain_version`, toolchain_version );
            }

      - name: Resave inital clang sysroot cache
        id: clang_root
        if: ${{ inputs.compiler =='clang' && env.toolchain_version  }}
        uses: ./action/resave_cache
        with: 
          path: ${{ github.workspace }}/mpv-winbuild-cmake/clang_root
          key: ${{ matrix.bit }}-clang_root-${{ env.toolchain_version }}
          restore-keys: ${{ matrix.bit }}-clang_root-${{ env.toolchain_version }}
          
  cache_llvm:
    name: keep llvm cache alive
    needs: [params,build_mpv]
    if: ${{ inputs.no_save_cache != true && inputs.compiler =='clang' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/archlinux/archlinux:base-devel
    continue-on-error: true

    steps:
      - name: Prepare
        run: |
          sudo pacman -Syu --noconfirm
          sudo pacman -S --noconfirm --needed git curl
      - uses: actions/checkout@v6
      
      - name: Resave llvm cache
        id: llvm
        continue-on-error: true
        uses: ./action/resave_cache
        with: 
          path: mpv-winbuild-cmake/clang_root
          key: llvm-
          restore-keys: llvm-
